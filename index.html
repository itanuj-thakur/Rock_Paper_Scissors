<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <link rel="stylesheet" href="style.css">
    
    <title>Rock Paper Scissors</title>
</head>

<body>
    <h3>ROCK PAPER SCISSORS</h3>
    <!--vsContainer-->
    <div id="vsContainer">
        <div class="player">
            <p id="youText">YOU</p>
            <img src="images/rock.png" alt="Rock" id="youImg" class="vsCont">
        </div>

        <div class="vs">
            <img src="images/versus.png" alt="VS" id="vsImg" class="vsCont">
            <div id="resultContainer">
                <p id="result">RESULT</p>
            </div>
        </div>

        <div class="player">
            <p id="computerText">COMPUTER</p>
            <img src="images/paper.png" alt="Paper" id="compImg" class="vsCont">
        </div>

    </div>
    <div id="bottomContainer">

        <!--ScoreContainer-->


        <div id="scoreContainer">
            <p>SCORECARD</p>
            <div class="scoreRow">
                <span>YOU</span>
                <span id="yourScore">0</span>
            </div>

            <div class="scoreRow">
                <span>COMPUTER</span>
                <span id="computerScore">0</span>
            </div>

            <div class="scoreRow">
                <span>DRAW</span>
                <span id="drawScore">0</span>
            </div>
        </div>

        <!--moveContainer-->

        <div id="moveContainer">
            <p>CHOOSE YOUR MOVE</p>
            <div id="moveImg">
                <div><img src="images/rock.png" alt="rock" id="rockChoice" class="moveCont"><p>ROCK</p></div>
                <div><img src="images/paper.png" alt="paper" id="paperChoice" class="moveCont"><p>PAPER</p></div>
                <div><img src="images/scissors.png" alt="scissors" id="scissorsChoice" class="moveCont"><p>SCISSORS</p></div>
                
            </div>
        </div>


        <!--historyContainer-->
        <div id="historyContainer">

            <p id="historyText">HISTORY</p>
            <div id="history">

            </div>
        </div>
    </div>

    <button type="reset" id="resetBtn">⟳ RESET GAME</button>
    <script src="script.js"></script>
</body>

</html>
